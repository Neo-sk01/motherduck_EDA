name: Build Pipeline Image

on:
  # TeamCity now owns push-based CI/CD. Keep this workflow as a manual fallback.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest -q

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + push image
        env:
          IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/neolore-pipeline:${{ github.sha }}
        run: |
          docker build -t $IMAGE -t ${{ secrets.ACR_NAME }}.azurecr.io/neolore-pipeline:latest .
          docker push $IMAGE
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/neolore-pipeline:latest

      - name: Update Container Apps Job to new image
        env:
          IMAGE: ${{ secrets.ACR_NAME }}.azurecr.io/neolore-pipeline:${{ github.sha }}
          JOB_NAME: ${{ secrets.CONTAINER_APP_JOB_NAME }}
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          az containerapp job update \
            --name "$JOB_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE"
