name: Deploy Function

on:
  # TeamCity now owns push-based CI/CD. Keep this workflow as a manual fallback.
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      FUNCTION_APP_NAME: neolore-queue-fn
      STORAGE_ACCOUNT: neolorequeuefngnqgt5titv
      CONTAINER: scm-releases
      SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install (dev + test)
        run: |
          python -m pip install --upgrade pip
          pip install -r functions/requirements.txt pytest

      - name: Test
        run: pytest functions/tests -v

      - name: Vendor runtime deps into function package
        run: |
          pip install \
            -r functions/requirements.txt \
            --target=functions/.python_packages/lib/site-packages \
            --no-compile

      - name: Package function app
        run: |
          cd functions
          zip -r ../functionapp.zip . \
            -x "tests/*" "**/__pycache__/*" "*.pyc" ".pytest_cache/*"
          ls -lh ../functionapp.zip

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload package to scm-releases container
        run: |
          BLOB_NAME="functionapp-$SHA.zip"
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name "$CONTAINER" \
            --name "$BLOB_NAME" \
            --file functionapp.zip \
            --auth-mode login \
            --overwrite \
            --output none
          echo "BLOB_NAME=$BLOB_NAME" >> "$GITHUB_ENV"

      - name: Point WEBSITE_RUN_FROM_PACKAGE at the new blob
        run: |
          BLOB_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net/${CONTAINER}/${BLOB_NAME}"
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings "WEBSITE_RUN_FROM_PACKAGE=$BLOB_URL" \
            --output none

      - name: Sync function triggers
        run: |
          az resource invoke-action \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --resource-type Microsoft.Web/sites \
            --action syncfunctiontriggers \
            --output none
