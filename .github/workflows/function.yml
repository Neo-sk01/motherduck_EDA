name: Deploy Function

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/function.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      FUNCTION_APP_NAME: neolore-queue-fn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r functions/requirements.txt pytest

      - name: Test
        run: pytest functions/tests -v

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure remote build app settings
        run: |
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=1 ENABLE_ORYX_BUILD=true \
            --output none

      - name: Package function app
        run: |
          cd functions
          zip -r ../functionapp.zip . \
            -x "tests/*" "**/__pycache__/*" "*.pyc" ".pytest_cache/*"

      - name: Deploy via CLI zip deploy
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --src functionapp.zip
